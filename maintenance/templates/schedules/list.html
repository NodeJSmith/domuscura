{% extends "base.html" %}

{% block title %}Schedules — Domuscura{% endblock %}

{% block content %}
<hgroup>
    <h1>Schedules</h1>
    <p>Recurring maintenance tasks</p>
</hgroup>

<!-- Filters -->
<form method="get" action="{% url 'schedule_list' %}" class="schedule-filters">
    <div class="grid">
        <label>
            Search
            <input type="search" name="q" value="{{ filters.q }}" placeholder="Search schedules...">
        </label>
        <label>
            Category
            <select name="category" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if filters.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Priority
            <select name="priority" onchange="this.form.submit()">
                <option value="">All Priorities</option>
                {% for value, label in priorities %}
                <option value="{{ value }}" {% if filters.priority == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    <div class="grid">
        <label>
            Location
            <select name="location" onchange="this.form.submit()">
                <option value="">All Locations</option>
                {% for loc in locations %}
                <option value="{{ loc.id }}" {% if filters.location == loc.id|stringformat:"s" %}selected{% endif %}>{{ loc.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            Status
            <select name="status" onchange="this.form.submit()">
                <option value="">All Statuses</option>
                <option value="overdue" {% if filters.status == "overdue" %}selected{% endif %}>Overdue</option>
                <option value="due_soon" {% if filters.status == "due_soon" %}selected{% endif %}>Due Soon</option>
                <option value="ok" {% if filters.status == "ok" %}selected{% endif %}>OK</option>
                <option value="never_done" {% if filters.status == "never_done" %}selected{% endif %}>Never Done</option>
            </select>
        </label>
        <label>
            Active
            <select name="active" onchange="this.form.submit()">
                <option value="active" {% if filters.active == "active" %}selected{% endif %}>Active Only</option>
                <option value="inactive" {% if filters.active == "inactive" %}selected{% endif %}>Inactive Only</option>
                <option value="all" {% if filters.active == "all" %}selected{% endif %}>All</option>
            </select>
        </label>
    </div>
    <div class="filter-actions">
        <button type="submit">Search</button>
        <a href="{% url 'schedule_list' %}" role="button" class="outline secondary">Clear</a>
        <a href="{% url 'schedule_create' %}" role="button" class="outline" style="margin-left: auto;">+ New Schedule</a>
    </div>
    <input type="hidden" name="sort" value="{{ filters.sort }}">
</form>

<!-- Results -->
<figure>
<table role="grid">
    <thead>
        {% with fp="q="|add:filters.q|add:"&category="|add:filters.category|add:"&priority="|add:filters.priority|add:"&status="|add:filters.status|add:"&active="|add:filters.active|add:"&location="|add:filters.location %}
        <tr>
            <th>
                {% if filters.sort == "name" %}<a href="?sort=-name&{{ fp }}">Name <span class="sort-asc">↑</span></a>
                {% elif filters.sort == "-name" %}<a href="?{{ fp }}">Name <span class="sort-desc">↓</span></a>
                {% else %}<a href="?sort=name&{{ fp }}">Name</a>{% endif %}
            </th>
            <th class="col-mobile-hide">
                {% if filters.sort == "category" %}<a href="?sort=-category&{{ fp }}">Category <span class="sort-asc">↑</span></a>
                {% elif filters.sort == "-category" %}<a href="?{{ fp }}">Category <span class="sort-desc">↓</span></a>
                {% else %}<a href="?sort=category&{{ fp }}">Category</a>{% endif %}
            </th>
            <th class="col-mobile-hide">
                {% if filters.sort == "frequency" %}<a href="?sort=-frequency&{{ fp }}">Frequency <span class="sort-asc">↑</span></a>
                {% elif filters.sort == "-frequency" %}<a href="?{{ fp }}">Frequency <span class="sort-desc">↓</span></a>
                {% else %}<a href="?sort=frequency&{{ fp }}">Frequency</a>{% endif %}
            </th>
            <th class="col-mobile-hide">
                {% if filters.sort == "priority" %}<a href="?sort=-priority&{{ fp }}">Priority <span class="sort-asc">↑</span></a>
                {% elif filters.sort == "-priority" %}<a href="?{{ fp }}">Priority <span class="sort-desc">↓</span></a>
                {% else %}<a href="?sort=priority&{{ fp }}">Priority</a>{% endif %}
            </th>
            <th>
                {% if filters.sort == "status" %}<a href="?sort=-status&{{ fp }}">Status <span class="sort-asc">↑</span></a>
                {% elif filters.sort == "-status" %}<a href="?{{ fp }}">Status <span class="sort-desc">↓</span></a>
                {% else %}<a href="?sort=status&{{ fp }}">Status</a>{% endif %}
            </th>
            <th>Actions</th>
        </tr>
        {% endwith %}
    </thead>
    <tbody id="schedule-table-body">
        {% include "partials/schedule_list_body.html" %}
    </tbody>
</table>
</figure>

<p><small>{{ schedules|length }} schedule{{ schedules|length|pluralize }}</small></p>

{% include "partials/work_log_modal.html" %}
{% endblock %}
