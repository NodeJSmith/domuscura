{% extends "base.html" %}

{% block title %}Issues — Domuscura{% endblock %}

{% block content %}
<hgroup>
    <h1>Issues</h1>
    <p>Known problems and things to watch</p>
</hgroup>

<details open>
    <summary>Filters</summary>
    <form method="get">
        <div class="grid">
            <label>
                Search
                <input type="search" name="q" value="{{ filters.q }}" placeholder="Search issues...">
            </label>
            <label>
                Status
                <select name="status">
                    <option value="active" {% if filters.status == "active" %}selected{% endif %}>Active (not resolved)</option>
                    <option value="">All Statuses</option>
                    {% for value, label in statuses %}
                    <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                Severity
                <select name="severity">
                    <option value="">All Severities</option>
                    {% for value, label in severities %}
                    <option value="{{ value }}" {% if filters.severity == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>
        <div class="filter-actions">
            <button type="submit">Filter</button>
            <a href="{% url 'issue_list' %}" role="button" class="outline secondary">Clear</a>
            <a href="{% url 'issue_create' %}" role="button" class="outline" style="margin-left: auto;">+ New Issue</a>
        </div>
    </form>
</details>

<figure>
<table role="grid">
    <thead>
        <tr>
            <th>Issue</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Location</th>
            <th>Discovered</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for issue in issues %}
        <tr>
            <td>
                <a href="{% url 'issue_detail' issue.id %}"><strong>{{ issue.summary }}</strong></a>
                {% if issue.asset %}<br><small>{{ issue.asset.name }}</small>{% endif %}
            </td>
            <td>
                {% if issue.severity == "safety" %}
                <mark style="background: var(--pico-del-color); color: white; padding: 0.1rem 0.4rem; font-size: 0.75rem; border-radius: 0.25rem;">{{ issue.get_severity_display }}</mark>
                {% elif issue.severity == "major" %}
                <mark style="background: var(--color-severity-major); color: white; padding: 0.1rem 0.4rem; font-size: 0.75rem; border-radius: 0.25rem;">{{ issue.get_severity_display }}</mark>
                {% else %}
                <small>{{ issue.get_severity_display }}</small>
                {% endif %}
            </td>
            <td>{{ issue.get_status_display }}</td>
            <td>{{ issue.location|default:"—" }}</td>
            <td>{{ issue.discovered_at|date:"M j, Y"|default:"—" }}</td>
            <td>
                <a href="{% url 'issue_edit' issue.id %}"
                   role="button" class="outline secondary btn-action">
                    Edit
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="6">
                {% if any_exist %}
                    No issues match your filters.
                {% else %}
                    No issues yet. Issues track known problems to keep an eye on — like a slow drain, a crack in the drywall, or a mysterious noise. Link an issue to a project when you're ready to fix it. <a href="{% url 'issue_create' %}">Log your first issue</a>.
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>

<p><small>{{ issues|length }} issue{{ issues|length|pluralize }}</small></p>
{% endblock %}
