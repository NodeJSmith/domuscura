<!-- Work log modal — include this on any page that has "Log Work" buttons -->
<dialog id="work-log-modal" x-data="{ open: false }"
        x-bind:open="open"
        @work-log-open.window="open = true; $el.showModal()"
        @close="open = false"
        @click.self="$el.close()">
    <article>
        <header>
            <button aria-label="Close" rel="prev" @click="$el.closest('dialog').close()"></button>
            <h3>Log Work</h3>
        </header>
        <div id="work-log-form-container"></div>
    </article>
</dialog>
