<form hx-post="{% url 'work_log_form' %}"
      hx-target="#work-log-form-container"
      hx-swap="{% if schedule %}none{% else %}innerHTML{% endif %}">
    {% csrf_token %}

    {% if schedule %}
        <input type="hidden" name="schedule" value="{{ schedule.id }}">
        <p><strong>Logging work for:</strong> {{ schedule.name }}</p>
    {% else %}
        <label>
            Schedule (optional)
            {{ form.schedule }}
        </label>
        <label>
            Project (optional)
            {{ form.project }}
        </label>
    {% endif %}

    <div class="grid">
        <label>
            Completed on
            {{ form.completed_at }}
            <small>Defaults to today</small>
        </label>
        <label>
            Performed by
            {{ form.performed_by }}
        </label>
    </div>

    <div class="grid">
        <label>
            Cost ($)
            {{ form.cost }}
        </label>
        <label>
            Duration (minutes)
            {{ form.duration_minutes }}
        </label>
    </div>

    <label>
        Notes
        {{ form.notes }}
    </label>

    {% if form.errors %}
    <article aria-label="Validation errors" style="background: var(--pico-del-color); color: white; padding: 0.5rem 1rem;">
        {{ form.errors }}
    </article>
    {% endif %}

    <div class="modal-footer">
        <button type="submit">Save</button>
    </div>
</form>
