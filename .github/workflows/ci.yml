name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --dev
      - run: uv run python -m py_compile domuscura/settings.py
      - run: uv run python manage.py check --deploy --fail-level WARNING
        env:
          DJANGO_SECRET_KEY: ci-test-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --dev
      - run: uv run python manage.py migrate --run-syncdb
      - run: uv run pytest -v
        env:
          DJANGO_SECRET_KEY: ci-test-key

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: domuscura:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
